[pytest]
markers =
    legacy: retained legacy regression coverage; not a deletion signal.
    debug: retained debug/offline tooling coverage.
    historical: retained historical workflow or preview coverage.
    safety: safety boundary, evidence semantics, or fail-closed regression coverage.
    isaac: Isaac SIM_ONLY operator, bridge, or simulation-readiness coverage.
    real_path: real robot path safety, readiness, execution, or evidence coverage.
    shared: backend-neutral shared contract coverage.
