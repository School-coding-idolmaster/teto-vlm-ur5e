isaac_sim_operator:
  # Copy this file to the ignored
  # configs/isaac_sim_operator.lab.local.yaml and replace these placeholders
  # with workstation-local paths. Never commit lab-specific absolute paths.
  isaac_app_path: "<ISAAC_SIM_APP_PATH>"
  isaac_python_path: "<ISAAC_SIM_PYTHON_PATH>"
  # Use urdf_import with Isaac's bundled UR5e URDF, or switch to usd_reference
  # when a self-contained local UR5e USD is available.
  asset_mode: urdf_import
  ur5e_asset_path: "<UR5E_USD_PATH>"
  ur5e_urdf_path: "<UR5E_URDF_PATH>"
  ros_package_path_for_asset_resolution: "<ROS_PACKAGE_PATH>"
  world_stage_path: null
  robot_prim_path: /World/TETO_UR5e
  robot_base_position_m: [0.0, 0.0, 0.0]
  base_frame: base_link
  tool_frame: tool0
  qwen_endpoint: http://127.0.0.1:18080/api/generate

  gui_required: true
  real_robot_disabled: true
  real_robot_enabled: false
  allow_real_robot: false
  allow_moveit_execute: false
  dashboard_enabled: false
  rtde_write_enabled: false

  # Isaac-only long-range demo envelope. This does not alter any real gateway.
  max_substep_distance_m: 0.05
  max_total_distance_m: 0.50
  position_tolerance_m: 0.008
  ik_position_tolerance_m: 0.002
  ik_orientation_tolerance_rad: 0.05
  frames_per_substep: 90
  startup_render_frames: 30
  apply_initial_home_pose: true
  initial_home_pose_rad:
    shoulder_pan_joint: 0.0
    shoulder_lift_joint: -1.57
    elbow_joint: 1.57
    wrist_1_joint: -1.57
    wrist_2_joint: -1.57
    wrist_3_joint: 0.0
  home_pose_settle_frames: 30
  # Isaac-only Cartesian demo start chosen to leave room for +/-0.50 m approach.
  demo_center_tcp_position_m: [0.20, 0.0, 0.35]
  visual_demo_slowdown_enabled: true
  motion_duration_sec: 2.4
  substep_pause_sec: 0.25
  visual_demo_fps: 60
  visual_markers_enabled: true
  trajectory_trace_enabled: true
  # Low-cost scene checks may run per substep. They never call Qwen/VLM.
  # "none" is a safe placeholder until an Isaac camera adapter is configured.
  scene_monitor_type: none
  scene_monitor_frequency_hz: 5.0
  camera_monitor_unavailable_policy: warn_only
  adaptive_reobservation_enabled: true
  workspace_envelope:
    x: [-1.0, 1.0]
    y: [-1.0, 1.0]
    z: [0.0, 2.0]

  documentation_note: >-
    This example auto-discovers no real UR endpoint and must never contain a
    robot controller address. Put workstation-only Isaac paths in an ignored
    configs/isaac_sim_operator.lab.local.yaml if these defaults do not match.
