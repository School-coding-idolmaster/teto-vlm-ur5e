cartesian_motion_pipeline:
  user_command: move 10 cm higher
  current_tcp_pose:
    frame: base_link
    position_m: [0.40, 0.0, 0.30]
    orientation_xyzw: [0.0, 0.0, 0.0, 1.0]

  command_to_task_adapter:
    adapter_mode: qwen_llm
    llm_backend: ollama
    model_name: qwen2.5vl:3b
    confidence_threshold: 0.60
    max_cartesian_translation_m: 0.20

  allowed_frames:
    - base_link
  max_translation_m: 0.20
  workspace_bounds:
    x: [-1.0, 1.0]
    y: [-1.0, 1.0]
    z: [0.0, 2.0]

  planning_group: ur_manipulator
  planning_frame: base_link
  end_effector_frame: tool0
  moveit_execution_mode: shadow
  move_group_action_name: /move_action
  execute_trajectory_action_name: /execute_trajectory
  action_server_timeout_s: 5.0
  action_result_timeout_s: 30.0
  execute_result_timeout_s: 60.0
  position_tolerance_m: 0.005
  orientation_tolerance_rad: 0.05
  max_speed_scale: 0.10
  max_acc_scale: 0.10

  manual_confirmation_required: true
  manual_confirmation_token: CONFIRM_REAL_UR5_CARTESIAN
  manual_confirmation_phrase: I understand this will move the real UR5
  manual_confirmation_timeout_s: 30

  enable_ros2_runtime: false
  enable_moveit_plan: false
  enable_moveit_execute: false
  enable_real_robot_motion: false
  ros2_runtime_available: false
  moveit_runtime_available: false
  moveit_plan_success: false
  moveit_execute_allowed: false
